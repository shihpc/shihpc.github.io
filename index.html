<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>股市雷達 · Dashboard Hub</title>
<style>
  :root{
    --bg:#0b1120;
    --bg2:#111a2e;
    --card:#16213a;
    --card-hover:#1d2b4a;
    --line:#243556;
    --txt:#e6edf7;
    --muted:#8aa0c0;
    --accent:#4f9cff;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:"Segoe UI","PingFang TC","Microsoft JhengHei",system-ui,sans-serif;
    background:radial-gradient(1200px 600px at 50% -10%,var(--bg2),var(--bg));
    color:var(--txt);
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:64px 20px;
  }
  header{text-align:center;margin-bottom:48px}
  header h1{font-size:2rem;font-weight:700;letter-spacing:.5px}
  header p{color:var(--muted);margin-top:10px;font-size:1rem}
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
    gap:24px;
    width:100%;
    max-width:920px;
  }
  .card{
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
    background:var(--card);
    border:1px solid var(--line);
    border-radius:18px;
    padding:36px 24px;
    text-decoration:none;
    color:inherit;
    transition:transform .18s ease,background .18s ease,border-color .18s ease,box-shadow .18s ease;
  }
  .card:hover{
    transform:translateY(-6px);
    background:var(--card-hover);
    border-color:var(--accent);
    box-shadow:0 14px 40px rgba(79,156,255,.18);
  }
  .icon{
    width:72px;height:72px;
    display:flex;align-items:center;justify-content:center;
    border-radius:16px;
    margin-bottom:18px;
  }
  .icon svg{width:40px;height:40px}
  .card h2{font-size:1.2rem;font-weight:650;margin-bottom:8px}
  .card p{color:var(--muted);font-size:.9rem;line-height:1.5}
  footer{margin-top:56px;color:var(--muted);font-size:.82rem;text-align:center}
  footer a{color:var(--accent);text-decoration:none}

  /* 密碼門 */
  #gate{
    position:fixed;inset:0;z-index:999;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:radial-gradient(1200px 600px at 50% -10%,var(--bg2),var(--bg));
    gap:18px;padding:20px;
  }
  #gate h2{font-size:1.4rem;font-weight:700}
  #gate .sub{color:var(--muted);font-size:.9rem;margin-top:-6px}
  #gate form{display:flex;flex-direction:column;gap:14px;width:100%;max-width:300px;margin-top:6px}
  #gate input[type=password]{
    background:var(--card);border:1px solid var(--line);border-radius:12px;
    padding:14px 16px;color:var(--txt);font-size:1rem;text-align:center;letter-spacing:.2em;
    outline:none;transition:border-color .15s;
  }
  #gate input[type=password]:focus{border-color:var(--accent)}
  #gate .remember{display:flex;align-items:center;justify-content:center;gap:8px;color:var(--muted);font-size:.88rem;cursor:pointer}
  #gate button{
    background:var(--accent);color:#06122a;border:none;border-radius:12px;
    padding:13px;font-size:1rem;font-weight:650;cursor:pointer;transition:opacity .15s;
  }
  #gate button:hover{opacity:.9}
  #gate .err{color:#ff6b6b;font-size:.85rem;min-height:1.1em}
  body.locked main,body.locked header,body.locked footer{display:none}
</style>
</head>
<body class="locked">
  <div id="gate">
    <h2>🔒 股市雷達</h2>
    <div class="sub">請輸入密碼進入</div>
    <form id="gateForm">
      <input type="password" id="pw" inputmode="numeric" autocomplete="current-password" placeholder="密碼" autofocus>
      <label class="remember"><input type="checkbox" id="remember" checked> 記住我(這台裝置免再輸入)</label>
      <button type="submit">進入</button>
      <div class="err" id="err"></div>
    </form>
  </div>

  <header>
    <h1>📊 股市雷達</h1>
    <p>選擇要查看的數值儀表板</p>
  </header>

  <main class="grid" id="grid"></main>

  <footer>
    資料來源:FinMind · <a href="https://github.com/shihpc">github.com/shihpc</a>
  </footer>

<script>
/* ===== 密碼門(輕量遮罩,非真正安全)=====
   PW_HASH = SHA-256("你的密碼")。要改密碼:重算雜湊換掉這行即可。 */
const PW_HASH = "1155b0007068f8e930964e11ee161fe2958854fa8c82746890802b8ec38c9e67";
const AUTH_KEY = "radar_auth";

async function sha256(s){
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(s));
  return [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2,"0")).join("");
}
function unlock(){
  document.body.classList.remove("locked");
  document.getElementById("gate").remove();
  renderCards();
}

/* ────────────────────────────────────────────────
   新增專案:在這個陣列加一筆即可。
   - name / desc / url 必填
   - icon  可選,對應下方 ICONS 的 key(預設 chart)
   - color 可選,不填會自動依順序分配
   ──────────────────────────────────────────────── */
const PROJECTS = [
  {
    name: "即時類股動態",
    desc: "秒級即時 · Cloudflare 加速 · 自動刷新",
    url:  "https://shihpc.github.io/taiwan-flow-live-v2/",
    icon: "bolt",
    color: ["#0f3a3a", "#06b6d4"], // 青:標示「即時 / 快」
  },
  {
    name: "盤後法人動態",
    desc: "外資 / 投信 / ETF 進出與資金流動",
    url:  "https://shihpc.github.io/taiwan-flows/",
    icon: "flow",
    color: ["#14532d", "#16a34a"], // 綠(釘原色,不受新卡位移影響)
  },
  {
    name: "台股新聞",
    desc: "投信 / 外資連買股 · 白名單過濾新聞",
    url:  "https://shihpc.github.io/taiwan-stock-news/",
    icon: "news",
    color: ["#4a2c0f", "#f59e0b"], // 橙:標示「新聞 / 資訊」
  },
];

/* 漸層色盤:專案多於色盤時自動循環 */
const PALETTE = [
  ["#1e3a5f", "#2563eb"], // 藍
  ["#14532d", "#16a34a"], // 綠
  ["#5b2150", "#db2777"], // 粉
  ["#4a2c0f", "#f59e0b"], // 橙
  ["#3b2168", "#8b5cf6"], // 紫
  ["#0f3a3a", "#06b6d4"], // 青
];

/* ICON 圖庫:要新增圖示就在這裡加一個 key → SVG 內容 */
const ICONS = {
  chart: '<path d="M3 3v18h18"/><path d="M7 14l4-4 3 3 5-6"/>',
  flow:  '<path d="M12 2v20M2 12h20"/><circle cx="12" cy="12" r="9"/>',
  radar: '<rect x="3" y="3" width="18" height="18" rx="2"/><path d="M8 13l2 2 5-5"/>',
  bolt:  '<path d="M13 2L4 14h7l-1 8 9-12h-7l1-8z"/>',
  news:  '<path d="M4 5h13v14H6a2 2 0 0 1-2-2z"/><path d="M17 8h3v9a2 2 0 0 1-2 2"/><path d="M8 9h6M8 12h6M8 15h4"/>',
};

function renderCards(){
  const grid = document.getElementById("grid");
  PROJECTS.forEach((p, i) => {
    const [c1, c2] = p.color || PALETTE[i % PALETTE.length];
    const svg = ICONS[p.icon] || ICONS.chart;
    const a = document.createElement("a");
    a.className = "card";
    a.href = p.url;
    a.innerHTML =
      '<div class="icon" style="background:linear-gradient(135deg,' + c1 + ',' + c2 + ')">' +
        '<svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' + svg + '</svg>' +
      '</div>' +
      '<h2></h2><p></p>';
    a.querySelector("h2").textContent = p.name;
    a.querySelector("p").textContent  = p.desc;
    grid.appendChild(a);
  });
}

/* ===== 啟動:已記住就直接放行,否則掛上密碼門 =====
   (放在最後,確保 renderCards 用到的 PROJECTS 等已初始化) */
if (localStorage.getItem(AUTH_KEY) === PW_HASH || sessionStorage.getItem(AUTH_KEY) === PW_HASH) {
  unlock();
} else {
  document.getElementById("gateForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const pw  = document.getElementById("pw").value;
    const err = document.getElementById("err");
    if (await sha256(pw) === PW_HASH) {
      const store = document.getElementById("remember").checked ? localStorage : sessionStorage;
      store.setItem(AUTH_KEY, PW_HASH);
      unlock();
    } else {
      err.textContent = "密碼錯誤";
      document.getElementById("pw").value = "";
    }
  });
}
</script>
</body>
</html>
